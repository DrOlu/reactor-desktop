name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  bundle-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--bundles app,dmg"
            os_name: "macOS"
            rust_targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - platform: windows-latest
            args: "--bundles nsis,msi"
            os_name: "Windows"
            rust_targets: ""
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb"
            os_name: "Linux"
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux dependencies (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # macOS: ensure Xcode CLI tools available (no signing required)
      - name: Setup macOS environment
        if: matrix.platform == 'macos-latest'
        run: |
          # Ensure we don't try to codesign (no Apple Developer cert)
          echo "CODESIGN_IDENTITY=-" >> $GITHUB_ENV
          # Remove any stale keychain entries that could cause issues
          security list-keychains 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag
        id: release_tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Unable to resolve release tag" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and publish (${{ matrix.os_name }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: disable codesigning (no Apple Developer cert needed)
          APPLE_SIGNING_IDENTITY: "-"
          # Linux: ensure dbus/display available for AppImage
          DISPLAY: ":99"
        with:
          tagName: ${{ steps.release_tag.outputs.tag }}
          releaseName: "Reactor Desktop ${{ steps.release_tag.outputs.tag }}"
          releaseBody: |
            Cross-platform Reactor Desktop release by Hyperspace Technologies.

            Included platform artifacts are uploaded by GitHub Actions.
            See README and docs for setup and usage.
          releaseDraft: false
          prerelease: ${{ contains(steps.release_tag.outputs.tag, '-') }}
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
